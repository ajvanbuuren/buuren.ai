<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <title>Pagina niet gevonden — Buuren.AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: 'Inter', system-ui, sans-serif; color: #27272a; min-height: 100vh; display: flex; flex-direction: column; background: #fafafa; }
      .nav { border-bottom: 1px solid #e4e4e7; padding: 16px 24px; background: #fff; }
      .nav-inner { max-width: 720px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
      .nav-logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 24px; color: #18181b; text-decoration: none; letter-spacing: -0.02em; }
      .nav-logo img { width: 36px; height: 36px; }
      .nav-logo .ai { color: #303994; font-weight: 600; }
      .main { flex: 1; display: flex; align-items: center; justify-content: center; }
      .container { text-align: center; padding: 48px 24px; max-width: 480px; }
      .code { font-size: 96px; font-weight: 700; color: #303994; letter-spacing: -0.04em; line-height: 1; margin-bottom: 16px; }
      h1 { font-size: 24px; font-weight: 600; margin-bottom: 12px; }
      p { color: #71717a; margin-bottom: 32px; line-height: 1.6; }
      a.btn { display: inline-flex; align-items: center; gap: 8px; background: #303994; color: #fff; padding: 12px 28px; border-radius: 10px; text-decoration: none; font-weight: 500; font-size: 15px; transition: background 0.2s; }
      a.btn:hover { background: #252d7a; }
    </style>
  </head>
  <body>
    <nav class="nav">
      <div class="nav-inner">
        <a href="/" class="nav-logo"><img src="/logo.png" alt="Buuren.AI" /><span>Buuren<span class="ai">.AI</span></span></a>
      </div>
    </nav>
    <div class="main">
    <div class="container">
      <div class="code">404</div>
      <h1>Pagina niet gevonden</h1>
      <p>De pagina die u zoekt bestaat niet of is verplaatst. Geen zorgen — hieronder vindt u de weg terug.</p>
      <a href="/" class="btn">&larr; Terug naar de homepage</a>
    </div>
    </div>
  </body>
</html>
